services:
  postgres:
    image: postgres:18-alpine
    container_name: alt-bot-postgres
    environment:
      POSTGRES_DB: altbot
      POSTGRES_USER: altbot
      POSTGRES_PASSWORD: altbot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U altbot -d altbot"]
      interval: 5s
      timeout: 3s
      retries: 10

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alt-bot
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ALTBOT_DISCORD_TOKEN: ${ALTBOT_DISCORD_TOKEN}
      OWNER_ID: ${OWNER_ID}
      ALTBOT_DATABASE_URL: postgres://altbot:altbot@postgres:5432/altbot?sslmode=disable
      ALTBOT_LOG_LEVEL: info
    restart: unless-stopped

volumes:
  postgres_data: